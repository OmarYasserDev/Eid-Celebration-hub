<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sending Wishes</title>
    <link href="عيد-7-768x381.jpg" rel="icon" type="Image/jpg">
</head>

<body>

    <header>
        <h1 style="text-align: center;">Eid Mubarak 🎉🎉🎈</h1>
        <p style="text-align: center;"><b>A Time for Joy, A Time for Togetherness 🤍</b></p>
    </header>

    <section style="text-align: center;">
        <video controls width="300">
            <source src="Allah-Akbar.mp4" type="video/mp4">
        </video>
    </section>

   
    <section>
        <form>

            <label>Name:</label><br>
            <input type="text" placeholder="Enter the recevier name"><br><br>
            <label>Phone number:</label><br>
            <input type="tel" placeholder="recevier number"><br><br>

            <label>Gender:</label><br>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female
            <br><br>

            <label>Message:</label><br>
            <textarea placeholder="Write your Eid message..."></textarea>
            <br><br>

            <button type="submit">Send Wishes 🎁</button>

        </form>
    </section>

    <footer style="text-align: center; margin-top: 30px;">
        <p>Made by Omar Yasser ❤️</p>
    </footer>
<link rel="stylesheet" href="style.css">
</body>
</html>
